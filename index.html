<!DOCTYPE html>
<html>
<head>
    <title>My Webpage</title>

    <style>
        body {
            background-color: #ffeef8;
            font-family: "Comic Sans MS", "Poppins", sans-serif;
            text-align: center;
            color: #ff69b4;
            padding-top: 50px;
        }

        h1 {
            font-size: 48px;
            color: #ff85c2;
            text-shadow: 2px 2px #ffffff;
        }

        p {
            font-size: 20px;
            color: #ff6fa8;
        }

        .card {
            background: white;
            width: 60%;
            margin: 20px auto;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(255, 182, 193, 0.5);
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Hello, world!</h1>
        <p>This is my first webpage.</p>
    </div>
</body>
</html>
